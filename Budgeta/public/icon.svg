<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#F0EEFF"/>

  <!-- Donut ring — 6 category segments, r=168, stroke=80, circumference≈1055 -->
  <!-- Background ring -->
  <circle cx="256" cy="256" r="168" fill="none" stroke="#E2DAFF" stroke-width="82"/>

  <!-- Teal: 20% = 211px -->
  <circle cx="256" cy="256" r="168" fill="none" stroke="#0DBAA9" stroke-width="80"
    stroke-dasharray="211 844" stroke-dashoffset="264" stroke-linecap="butt"/>

  <!-- Purple: 17% = 179px -->
  <circle cx="256" cy="256" r="168" fill="none" stroke="#7C3AED" stroke-width="80"
    stroke-dasharray="179 876" stroke-dashoffset="53" stroke-linecap="butt"/>

  <!-- Coral: 18% = 190px -->
  <circle cx="256" cy="256" r="168" fill="none" stroke="#F4615A" stroke-width="80"
    stroke-dasharray="190 865" stroke-dashoffset="-126" stroke-linecap="butt"/>

  <!-- Amber: 17% = 179px -->
  <circle cx="256" cy="256" r="168" fill="none" stroke="#F59E0B" stroke-width="80"
    stroke-dasharray="179 876" stroke-dashoffset="-316" stroke-linecap="butt"/>

  <!-- Green: 15% = 158px -->
  <circle cx="256" cy="256" r="168" fill="none" stroke="#22C55E" stroke-width="80"
    stroke-dasharray="158 897" stroke-dashoffset="-495" stroke-linecap="butt"/>

  <!-- Blue: 13% = 137px — fills remaining -->
  <circle cx="256" cy="256" r="168" fill="none" stroke="#3B82F6" stroke-width="80"
    stroke-dasharray="137 918" stroke-dashoffset="-653" stroke-linecap="butt"/>
</svg>
