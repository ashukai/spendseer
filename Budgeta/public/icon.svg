<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Light lavender background -->
  <rect width="512" height="512" rx="112" fill="#F5F3FF"/>

  <!-- Eye whites / outer eye shape -->
  <ellipse cx="256" cy="256" rx="176" ry="110" fill="#EDE9FE"/>

  <!-- Eye outline -->
  <ellipse cx="256" cy="256" rx="176" ry="110" fill="none" stroke="#7C3AED" stroke-width="22" stroke-linecap="round"/>

  <!-- Iris -->
  <circle cx="256" cy="256" r="72" fill="#7C3AED"/>

  <!-- Pupil -->
  <circle cx="256" cy="256" r="42" fill="#4C1D95"/>

  <!-- Currency symbol in pupil -->
  <text x="256" y="274" font-family="Georgia, 'Times New Roman', serif" font-size="44" font-weight="700" fill="#EDE9FE" text-anchor="middle">¤</text>

  <!-- Top eyelash ticks -->
  <line x1="256" y1="143" x2="256" y2="118" stroke="#7C3AED" stroke-width="16" stroke-linecap="round"/>
  <line x1="314" y1="155" x2="326" y2="132" stroke="#7C3AED" stroke-width="13" stroke-linecap="round" opacity="0.55"/>
  <line x1="198" y1="155" x2="186" y2="132" stroke="#7C3AED" stroke-width="13" stroke-linecap="round" opacity="0.55"/>
  <line x1="360" y1="188" x2="376" y2="170" stroke="#7C3AED" stroke-width="11" stroke-linecap="round" opacity="0.35"/>
  <line x1="152" y1="188" x2="136" y2="170" stroke="#7C3AED" stroke-width="11" stroke-linecap="round" opacity="0.35"/>
</svg>
